<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Submissão de PDFs</title>
    <style>
        /* Reset básico e fonte */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }

        /* Centraliza todo o conteúdo */
        .container {
            max-width: 800px;
            margin: 50px auto;
            background: #fff;
            padding: 30px 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        label {
            display: block;
            margin-top: 20px;
            font-weight: bold;
            color: #555;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            resize: vertical;
            font-size: 14px;
            font-family: inherit;
        }

        input[type="file"] {
            margin-top: 10px;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .radio-group label {
            font-weight: normal;
        }

        .submit-btn {
            display: block;
            margin: 30px auto 0 auto;
            padding: 12px 25px;
            font-size: 16px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #0056b3;
        }

        /* Mensagens de erro */
        .messages {
            color: red;
            margin-top: 15px;
            list-style-type: none;
            padding-left: 0;
        }

        .messages li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Submissão de PDFs</h1>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <ul class="messages">
              {% for msg in messages %}
                <li>{{ msg }}</li>
              {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}

        <form action="/submit" method="post" enctype="multipart/form-data">
            <!-- Prompt -->
            <label for="prompt">Prompt / Instruções:</label>
            <textarea name="prompt" id="prompt">{{ default_prompt }}</textarea>

            <!-- Escolha do provedor -->
            <label>Escolha do provedor:</label>
            <div class="radio-group">
                <input type="radio" id="ollama" name="provider" value="ollama" checked>
                <label for="ollama" class="radio-btn">Ollama</label>

                <input type="radio" id="groq" name="provider" value="groq">
                <label for="groq" class="radio-btn">Groq</label>
            </div>

            <!-- Upload múltiplo de arquivos -->
            <label for="files">Selecione arquivos PDF:</label>
            <input type="file" name="files" id="files" multiple accept=".pdf">

            <button type="submit" class="submit-btn">Enviar</button>
        </form>
    </div>
</body>
</html>
